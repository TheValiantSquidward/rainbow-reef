modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
logoFile="rainbowreef.png"
authors="${mod_authors}"
credits="Owned and maintained by ValiantEnvoy and OmayPaty, special thanks to Alpha, Gec Master, platypushasnohat, and CodyHuh for help with programming, and to TheIndominator for animating some of the mobs!"
description='''${mod_description}'''

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"
